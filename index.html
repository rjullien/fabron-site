<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0077b6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Guide Fabron</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <h1>🌴 Guide Fabron</h1>
    <p class="subtitle">Votre studio à Nice</p>
    <button id="lang-toggle" class="lang-btn" onclick="toggleLang()">🇬🇧 EN</button>
  </header>

  <!-- Pages -->
  <main id="content">
    <!-- Home -->
    <section id="page-home" class="page active">
      <div class="hero-card">
        <img src="images/vue-mer-balcon.jpg" alt="Vue mer panoramique depuis le balcon" class="hero-image">
        <div class="hero-info">
          <h2 data-fr="Bienvenue" data-en="Welcome" data-es="Bienvenidos">Bienvenue</h2>
          <p class="subtitle" data-fr="Votre guide pour un séjour parfait à Nice" data-en="Your guide for a perfect stay in Nice" data-es="Su guía para una estancia perfecta en Niza">Votre guide pour un séjour parfait à Nice</p>
        </div>
      </div>
      <div id="welcome-content" class="content-area"></div>
      <!-- PIN unlock -->
      <div id="pin-section" class="pin-card">
        <h3 data-fr="🔑 Accéder au guide de l'appartement" data-en="🔑 Access apartment guide" data-es="🔑 Acceder a la guía del apartamento">🔑 Accéder au guide de l'appartement</h3>
        <p data-fr="Entrez le mot de passe fourni par votre hôte" data-en="Enter the password provided by your host" data-es="Introduzcan la contraseña proporcionada por su anfitrión">Entrez le mot de passe fourni par votre hôte</p>
        <div class="pin-input">
          <input type="password" id="pin-field" class="pin-text" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')pinSubmit()">
          <button class="pin-submit-btn" onclick="pinSubmit()">→</button>
        </div>
        <p id="pin-error" class="pin-error hidden" data-fr="Mot de passe incorrect" data-en="Incorrect password" data-es="Contraseña incorrecta">Mot de passe incorrect</p>
        <div id="pin-success" class="hidden">
          <p class="pin-ok">✅</p>
        </div>
      </div>
    </section>

    <!-- Transports -->
    <section id="page-transports" class="page">
      <div id="transports-content" class="content-area"></div>
    </section>

    <!-- Quartier -->
    <section id="page-quartier" class="page">
      <div id="quartier-content" class="content-area"></div>
    </section>

    <!-- Nice -->
    <section id="page-nice" class="page">
      <div id="nice-content" class="content-area"></div>
    </section>

    <!-- Restaurants -->
    <section id="page-restaurants" class="page">
      <div id="restaurants-content" class="content-area"></div>
    </section>

    <!-- Plages -->
    <section id="page-plages" class="page">
      <div id="plages-content" class="content-area"></div>
    </section>

    <!-- Apartment (locked) -->
    <section id="page-apartment" class="page">
      <div id="apartment-locked" class="locked-msg">
        <div class="lock-icon">🔒</div>
        <p data-fr="Entrez le mot de passe sur la page d'accueil pour débloquer" data-en="Enter password on home page to unlock" data-es="Introduzcan la contraseña en la página de inicio para desbloquear">Entrez le mot de passe sur la page d'accueil pour débloquer</p>
      </div>
      <div id="apartment-content" class="content-area hidden"></div>
    </section>
  </main>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab active" onclick="showPage('home')" data-page="home">
      <span class="tab-icon">🏠</span>
      <span class="tab-label" data-fr="Accueil" data-en="Home" data-es="Inicio">Accueil</span>
    </button>
    <button class="tab" onclick="showPage('transports')" data-page="transports">
      <span class="tab-icon">🚃</span>
      <span class="tab-label" data-fr="Transport" data-en="Transport" data-es="Transporte">Transport</span>
    </button>
    <button class="tab" onclick="showPage('quartier')" data-page="quartier">
      <span class="tab-icon">🏘️</span>
      <span class="tab-label" data-fr="Quartier" data-en="Area" data-es="Barrio">Quartier</span>
    </button>
    <button class="tab" onclick="showPage('nice')" data-page="nice">
      <span class="tab-icon">🏛️</span>
      <span class="tab-label">Nice</span>
    </button>
    <button class="tab" onclick="showPage('restaurants')" data-page="restaurants">
      <span class="tab-icon">🍽️</span>
      <span class="tab-label" data-fr="Restos" data-en="Dining" data-es="Restos">Restos</span>
    </button>
    <button class="tab" onclick="showPage('plages')" data-page="plages">
      <span class="tab-icon">🏖️</span>
      <span class="tab-label" data-fr="Plages" data-en="Beaches" data-es="Playas">Plages</span>
    </button>
    <button class="tab" onclick="showPage('apartment')" data-page="apartment">
      <span class="tab-icon">🔑</span>
      <span class="tab-label" data-fr="Appart" data-en="Apt" data-es="Piso">Appart</span>
    </button>
  </nav>

es, privées, avec ou sans restaurant, pour trouver votre petit coin de paradis méditerranéen.</p>\n<h3>🔑 <strong>Appartement</strong></h3>\n<p>Toutes les informations pratiques pour votre séjour : accès, équipements, WiFi, et conseils pour profiter au mieux de votre studio.</p>\n<hr>\n","transports":"<h3>🚋 Tramway — Votre meilleur ami !</h3>\n<p>La <strong>Ligne L2</strong> passe juste en bas de la résidence ! Arrêt le plus proche :</p>\n<ul>\n<li><strong>Fabron</strong> — à ~7 min à pied (descendre l&#39;avenue)</li>\n<li>💡 <strong>Raccourci</strong> 🚶‍♀️ : un escalier dans la résidence descend directement vers le tram et la mer (voir section Appartement pour les détails) !</li>\n</ul>\n<p><strong>Où ça va depuis l&#39;arrêt Fabron :</strong></p>\n<table>\n<thead>\n<tr>\n<th>Destination</th>\n<th>Temps</th>\n<th>Direction</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Aéroport Terminal 2</td>\n<td>~15 min</td>\n<td>→ Aéroport</td>\n</tr>\n<tr>\n<td>Parc Phoenix</td>\n<td>~9 min</td>\n<td>→ Aéroport</td>\n</tr>\n<tr>\n<td>Centre-ville (Jean Médecin)</td>\n<td>~10 min</td>\n<td>→ Port Lympia</td>\n</tr>\n<tr>\n<td>Promenade des Anglais (CUM)</td>\n<td>~6 min</td>\n<td>→ Port Lympia</td>\n</tr>\n<tr>\n<td>Vieux-Nice (Garibaldi)</td>\n<td>~13 min</td>\n<td>→ Port Lympia</td>\n</tr>\n<tr>\n<td>Port de Nice (Port Lympia)</td>\n<td>~15 min</td>\n<td>→ Port Lympia</td>\n</tr>\n</tbody></table>\n<p><strong>Horaires :</strong> ~4h30 à 1h30 du matin, toutes les 5-8 minutes en journée<br><strong>Tarif :</strong> 1,50 € le ticket (valable 74 min, correspondances incluses), 15 € le pass 7 jours — achetez aux bornes ou via l&#39;app <strong>Lignes d&#39;Azur</strong> (<a href=\"http://itunes.apple.com/fr/app/lignes-dazur-mobile/id423316741?mt=8\">App Store</a> / <a href=\"https://play.google.com/store/apps/details?id=fr.cityway.android.st2n\">Google Play</a>)</p>\n<blockquote>\n<p>💡 <strong>Tip :</strong> Validez toujours votre ticket en montant ! Contrôles fréquents.</p>\n</blockquote>\n<p>La <strong>Ligne L3</strong> passe aussi par les mêmes arrêts et prolonge vers Saint-Isidore.</p>\n<h3>🚂 Gares SNCF</h3>\n<p>La gare et l&#39;aéroport sont à seulement <strong>3 km</strong> !</p>\n<p><strong>Gare Nice Saint-Augustin</strong> <em>(la plus proche)</em> : Tram L2 → arrêt Parc Phoenix (~9 min), puis 5 min à pied.</p>\n<table>\n<thead>\n<tr>\n<th>Destination</th>\n<th>Durée</th>\n<th>Prix approximatif</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Antibes</strong></td>\n<td>~15 min</td>\n<td>~4 €</td>\n</tr>\n<tr>\n<td><strong>Cannes</strong></td>\n<td>~24 min</td>\n<td>~6 €</td>\n</tr>\n<tr>\n<td><strong>Monaco</strong></td>\n<td>~35 min</td>\n<td>~5 €</td>\n</tr>\n<tr>\n<td><strong>Menton</strong></td>\n<td>~45 min</td>\n<td>~7 €</td>\n</tr>\n<tr>\n<td><strong>Saint-Raphaël</strong></td>\n<td>~55 min</td>\n<td>~12 €</td>\n</tr>\n</tbody></table>\n<p><strong>Gare Nice-Ville</strong> <em>(gare principale, TGV)</em> : Tram L2 → Jean Médecin (~10 min), puis 10 min à pied ou correspondance L1. Paris, Marseille, Lyon, Milan...</p>\n<blockquote>\n<p>💡 <strong>Tip :</strong> Achetez vos billets TER sur l&#39;app <strong>SNCF Connect</strong> ou aux bornes en gare. Trains très fréquents (toutes les 20-30 min).</p>\n</blockquote>\n<h3>🚌 Bus</h3>\n<ul>\n<li>Réseau <strong>Lignes d&#39;Azur</strong> — même ticket que le tram (1,50 €)</li>\n<li><strong>Bus 12+</strong> : dessert l&#39;avenue de la Californie / Fabron Promenade → Cap 3000</li>\n</ul>\n<h3>🚗 Voiture</h3>\n<ul>\n<li><strong>Parking</strong> : votre place est incluse dans la résidence</li>\n<li><strong>Circulation</strong> : évitez la Promenade des Anglais aux heures de pointe !</li>\n<li><strong>Location</strong> : agences à l&#39;aéroport (Europcar, Hertz, Sixt…)</li>\n</ul>\n<h3>🛴 Vélos &amp; Trottinettes</h3>\n<ul>\n<li><strong>Vélo Bleu</strong> : vélos en libre-service, stations dans tout Nice</li>\n<li><strong>Dott / Lime</strong> : trottinettes électriques (app à télécharger)</li>\n</ul>\n<hr>\n","restaurants":"<blockquote>\n<p>🏘️ <strong>Restaurants du quartier Fabron</strong> → voir l&#39;onglet <strong>Quartier</strong> !</p>\n</blockquote>\n<blockquote>\n<p>🥘 <strong>À goûter absolument à Nice :</strong> Socca (galette de pois chiches), pissaladière (tarte oignons/anchois), salade niçoise, petits farcis, ratatouille, pan bagnat, tourte de blettes (sucrée !).</p>\n</blockquote>\n<h3>🏙️ En centre-ville / Vieux-Nice (10-15 min en tram L2)</h3>\n<p><em>Prenez le tram L2 depuis l&#39;arrêt Fabron — descendez à Jean Médecin, Garibaldi ou Port Lympia selon le resto !</em></p>\n<h4>🔥 <strong>Chez Pipo</strong> · € · Port</h4>\n<p>Socca &amp; niçoise — LA socca de Nice depuis 1923 ! Incontournable, cuite au feu de bois. Ambiance rustique et authentique.</p>\n<p><em>13 rue Bavastro</em></p>\n<h4><strong>Chez René Socca</strong> · € · Vieux-Nice</h4>\n<p>Socca &amp; niçoise — L&#39;autre institution de la socca ! Terrasse animée, pissaladière et petits farcis. File d&#39;attente = bon signe !</p>\n<p><em>2 rue Miralheti</em></p>\n<h4><strong>Sweet Sisters</strong> · € · Centre</h4>\n<p>Healthy / Pâtisserie — Salades composées, carrot cake à tomber ! Coloré et frais, parfait pour un déjeuner léger.</p>\n<p><em>Centre-ville</em></p>\n<h4><strong>Chez Acchiardo</strong> · €€ · Vieux-Nice</h4>\n<p>Niçoise familiale — Ambiance familiale depuis 1927, cuisine nissarde authentique. Daube, raviolis, tripes. Les locaux adorent.</p>\n<p><em>38 rue Droite</em></p>\n<h4><strong>La Merenda</strong> · €€ · Vieux-Nice</h4>\n<p>Niçoise puriste — Minuscule, pas de téléphone, pas de CB — que du cash et de la vraie cuisine niçoise. Pour les puristes !</p>\n<p><em>4 rue Raoul Bosio</em></p>\n<h4><strong>Le Safari</strong> · €€ · Cours Saleya</h4>\n<p>Méditerranéenne — Terrasse mythique face au marché aux fleurs. Parfait pour un dîner en soirée d&#39;été.</p>\n<p><em>1 Cours Saleya</em></p>\n<h4><strong>La Storia</strong> · €€ · Cours Saleya</h4>\n<p>Niçoise gourmande — Belle terrasse ensoleillée, spécialités niçoises (pissaladière, daube). Menu enfant dispo.</p>\n<p><em>Cours Saleya</em></p>\n<h4><strong>Les Épicuriens</strong> · €€-€€€ · Jean Médecin</h4>\n<p>Bistronomique — Cuisine fine et de saison, poulpe sublime. ~40€/pers. Réservation conseillée.</p>\n<p><em>Quartier Jean Médecin</em></p>\n<h4><strong>Peixes</strong> · €€-€€€ · Centre</h4>\n<p>Poisson / Fruits de mer — Ambiance marine, carte moderne autour des produits de la mer. Saveurs méditerranéennes et sud-américaines.</p>\n<p><em>Centre-ville</em></p>\n<h4>⭐ <strong>Restaurant JAN</strong> · €€€€ · Port Lympia</h4>\n<p>Gastronomique (1 étoile) — Expérience culinaire franco-sud-africaine unique. Menu 7 temps ~165-195€. Pour une soirée spéciale. Réservation obligatoire.</p>\n<p><em>Près du Port</em></p>\n<h3>🍕 Légende prix</h3>\n<ul>\n<li><strong>€</strong> = moins de 15 € par personne</li>\n<li><strong>€€</strong> = 15-30 € par personne</li>\n<li><strong>€€€</strong> = 30-60 € par personne</li>\n<li><strong>€€€€</strong> = plus de 60 € par personne</li>\n</ul>\n<blockquote>\n<p>💡 <strong>Tip :</strong> En France, le service est inclus dans l&#39;addition. Le pourboire n&#39;est pas obligatoire, mais arrondir ou laisser 5-10% pour un service exceptionnel est apprécié.</p>\n</blockquote>\n<blockquote>\n<p>💡 <strong>Tip :</strong> La majorité des restaurants sont ouverts aux horaires typiques : déjeuner (12h-14h) puis dîner (19h-22h30). Quelques restaurants restent ouverts en continu.</p>\n</blockquote>\n<hr>\n","nice":"<h3>🌊 Promenade des Anglais</h3>\n<p>La mythique &quot;Prom&#39;&quot; ! 7 km de front de mer bordé de palmiers, de l&#39;aéroport au Vieux-Nice. Parfait pour une balade, du jogging, du vélo ou du roller. Magnifique au coucher de soleil. 🌅</p>\n<ul>\n<li><strong>Accès depuis le studio :</strong> 10-15 min à pied en descendant vers la mer</li>\n<li><strong>Tip :</strong> Les célèbres chaises bleues face à la mer sont gratuites — installez-vous !</li>\n</ul>\n<h3>🏘️ Vieux-Nice (Old Town)</h3>\n<p>Un labyrinthe enchanteur de ruelles colorées, architecture baroque, façades ocre et rouge. Flânez sans plan, perdez-vous, c&#39;est la meilleure façon de le découvrir !</p>\n<ul>\n<li><strong>Cathédrale Sainte-Réparate</strong> — magnifique baroque du XVIIe</li>\n<li><strong>Chapelle de la Miséricorde</strong> — chef-d&#39;œuvre d&#39;art sacré</li>\n<li><strong>Tram :</strong> Arrêt Garibaldi ou Opéra/Vieille Ville</li>\n</ul>\n<h3>🌸 Cours Saleya — Le Marché</h3>\n<p>LE rendez-vous incontournable ! Marché de fleurs et de produits frais dans un cadre somptueux.</p>\n<ul>\n<li><strong>Ouvert :</strong> Tous les jours sauf lundi (brocante le lundi)</li>\n<li><strong>Horaires :</strong> ~6h à 17h30 (fleurs), ~6h à 13h30 (alimentaire)</li>\n<li><strong>Tip :</strong> Goûtez les olives, la socca, la pissaladière directement sur le marché !</li>\n</ul>\n<h3>🏔️ Colline du Château</h3>\n<p>Vue panoramique à 360° sur Nice, le port, la Baie des Anges et les Alpes. C&#39;est LE point de vue !</p>\n<ul>\n<li><strong>Accès :</strong> Escaliers depuis le Vieux-Nice, OU <strong>ascenseur gratuit</strong> (Tour Bellanda, quai des États-Unis)</li>\n<li><strong>Cascade</strong> artificielle en haut, aires de jeux, vestiges archéologiques</li>\n<li><strong>Gratuit</strong> — Ouvert tous les jours</li>\n</ul>\n<h3>🎨 MAMAC — Musée d&#39;Art Moderne et d&#39;Art Contemporain</h3>\n<p>Collection exceptionnelle : Yves Klein, Niki de Saint Phalle, Warhol, Lichtenstein...</p>\n<ul>\n<li><strong>Adresse :</strong> Place Yves Klein (près de Garibaldi)</li>\n<li><strong>Prix :</strong> <strong>GRATUIT !</strong> 🎉</li>\n<li><strong>Fermé le lundi</strong></li>\n</ul>\n<h3>🎨 Musée Matisse</h3>\n<p>Dédié à Henri Matisse qui a vécu à Nice. Collection magnifique dans une villa génoise du XVIIe, au cœur des jardins de Cimiez.</p>\n<ul>\n<li><strong>Prix :</strong> Gratuit !</li>\n<li><strong>Tram L1 :</strong> Arrêt Les Arènes / Musée Matisse</li>\n<li><strong>Bonus :</strong> Visitez aussi les <strong>Arènes romaines de Cimiez</strong> juste à côté</li>\n</ul>\n<h3>🎨 Musée National Marc Chagall</h3>\n<p>La plus grande collection au monde d&#39;œuvres de Chagall. Les vitraux sont extraordinaires.</p>\n<ul>\n<li><strong>Adresse :</strong> Avenue Docteur Ménard</li>\n<li><strong>Prix :</strong> ~8 € (gratuit -26 ans EU)</li>\n</ul>\n<h3>🏛️ Place Masséna</h3>\n<p>La place principale de Nice — fontaines, statues colorées sur leurs mâts (les &quot;Conversation à Nice&quot; de Jaume Plensa), architecture Belle Époque rouge.</p>\n<ul>\n<li><strong>Le soir :</strong> Illuminée, superbe ambiance</li>\n</ul>\n<h3>⛵ Port de Nice (Port Lympia)</h3>\n<p>Beau port coloré, yachts et bateaux de pêche. Excellents restaurants et bars sur les quais.</p>\n<ul>\n<li><strong>Tram L2 :</strong> Terminus Port Lympia</li>\n</ul>\n<h3>🥕 Marché de la Libération</h3>\n<p>Le marché des vrais Niçois ! Moins touristique que le Cours Saleya, plus authentique.</p>\n<ul>\n<li><strong>Ouvert :</strong> Tous les matins sauf lundi, ~6h à 13h</li>\n<li><strong>Tram L1 :</strong> Arrêt Libération</li>\n</ul>\n<h3>🌴 Parc Phoenix</h3>\n<p>Grand jardin botanique tropical avec serre géante (une des plus grandes d&#39;Europe !), animaux, lacs.</p>\n<ul>\n<li><strong>Adresse :</strong> 405 Promenade des Anglais</li>\n<li><strong>Prix :</strong> ~5 €</li>\n<li><strong>Tram L2 :</strong> Arrêt Parc Phoenix (à quelques arrêts de chez vous !)</li>\n</ul>\n<h3>🎯 Activités &amp; Excursions (été)</h3>\n<p><strong>🚤 Sorties en mer</strong></p>\n<ul>\n<li>Balades en bateau le long de la côte, criques cachées, baignade</li>\n<li>Excursion vers Saint-Jean-Cap-Ferrat, Monaco, Îles de Lérins</li>\n<li>📱 Réserver : <a href=\"https://www.getyourguide.com/nice-l314/\">GetYourGuide Nice</a> | <a href=\"https://www.viator.com/Nice/d478-ttd\">Viator Nice</a> | <a href=\"https://www.explorenicecotedazur.com/en/explore/discovery-tours/boat-trips/\">Trans Côte d&#39;Azur</a></li>\n</ul>\n<p><strong>🚗 Excursions à la journée</strong></p>\n<ul>\n<li><strong>Monaco</strong> — 20 min en train, rocher, casino, jardin exotique</li>\n<li><strong>Èze</strong> — village perché, vue vertigineuse, parfumerie Fragonard</li>\n<li><strong>Antibes / Juan-les-Pins</strong> — remparts, Picasso, plages de sable</li>\n<li><strong>Cannes</strong> — Croisette, vieille ville du Suquet, îles de Lérins</li>\n<li><strong>Saint-Paul-de-Vence</strong> — village artiste, fondation Maeght</li>\n<li><strong>Gorges du Verdon</strong> — canyon spectaculaire (~2h de route)</li>\n<li><strong>Marché de Vintimille</strong> (Italie) — vendredi matin, 40 min en train, shopping et produits italiens</li>\n<li>📱 Réserver : <a href=\"https://www.getyourguide.com/nice-l314/\">GetYourGuide</a> | <a href=\"https://www.viator.com/Nice/d478-ttd\">Viator</a></li>\n</ul>\n<p><strong>🎭 Événements été 2026</strong></p>\n<ul>\n<li><strong>Fête de la Musique</strong> — 21 juin 🎶 (concerts gratuits partout dans Nice !)</li>\n<li><strong>La Crème Festival</strong> — 26-28 juin, Villefranche-sur-Mer (musique, gastronomie, plein air)</li>\n<li><strong>Nice Jazz Festival</strong> — juillet (un des plus anciens festivals de jazz au monde !)</li>\n<li><strong>Feux d&#39;artifice</strong> — juillet-août sur la Promenade des Anglais</li>\n<li><strong>Fête de la Lavande</strong> — juillet-août, Valensole (champs de lavande, ~2h de route)</li>\n<li>📱 Agenda complet : <a href=\"https://www.explorenicecotedazur.com/preparer/nos-grands-evenements/agenda/\">explorenicecotedazur.com/agenda</a> | <a href=\"https://cotedazurfrance.fr/decouvrir/grands-evenements/\">cotedazurfrance.fr</a></li>\n</ul>\n<p><strong>🏊 Location &amp; Activités sportives</strong></p>\n<ul>\n<li><strong>Vélos Bleus</strong> — vélos en libre-service dans tout Nice</li>\n<li>Location vélos / e-bikes / trottinettes : nombreux loueurs en centre-ville</li>\n<li>Plongée, kayak, paddle — depuis les plages ou le port</li>\n<li>📱 Chercher : <a href=\"https://www.tripadvisor.fr/Attractions-g187234-Activities-Nice_French_Riviera_Cote_d_Azur_Provence_Alpes_Cote_d_Azur.html\">TripAdvisor Nice activités</a></li>\n</ul>\n<hr>\n","plages":"<h3>⚠️ À savoir avant tout !</h3>\n<p>Les plages de Nice sont en <strong>galets</strong> (pas de sable !). On s&#39;y fait vite, mais prévoyez :</p>\n<ul>\n<li>👟 <strong>Chaussures d&#39;eau</strong> (en vente partout à Nice, ~5-10 €)</li>\n<li>🏖️ <strong>Matelas de plage</strong> (le confort sur les galets !)</li>\n<li>🧴 Crème solaire (le soleil tape fort ici)</li>\n</ul>\n<h3>🏖️ Plages proches du studio</h3>\n<p><strong>Plages de Fabron / Carras</strong> <em>(~11 min à pied via le raccourci)</em> 🏅</p>\n<ul>\n<li>✅ <strong>Publiques et gratuites</strong></li>\n<li>✅ Moins bondées que le centre-ville</li>\n<li>✅ Eau claire et propre</li>\n<li>Douches et accès mer aménagés par endroits</li>\n<li>C&#39;est votre plage de quartier — profitez-en !</li>\n</ul>\n<h3>🏖️ Plages du centre-ville</h3>\n<h4>Plages publiques (gratuites)</h4>\n<table>\n<thead>\n<tr>\n<th>Plage</th>\n<th>Particularité</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Plage des Ponchettes</strong></td>\n<td>En plein Vieux-Nice, ambiance animée</td>\n</tr>\n<tr>\n<td><strong>Plage du Centenaire</strong></td>\n<td>Face au Jardin Albert 1er, bien aménagée</td>\n</tr>\n</tbody></table>\n<h4>Plages privées</h4>\n<h4><strong>Blue Beach</strong> · €€</h4>\n<p>Bonne ambiance, musique, cocktails</p>\n<h4><strong>Castel Plage</strong> · €€</h4>\n<p>Face au Vieux-Nice, restaurant sur place</p>\n<h4><strong>Beau Rivage</strong> · €€€</h4>\n<p>Restaurant, transats, service plage de luxe</p>\n<h3>🏖️ La pépite secrète</h3>\n<p><strong>Villefranche-sur-Mer</strong> <em>(20 min en voiture ou bus)</em> — L&#39;une des rares <strong>plages de sable</strong> de la Côte d&#39;Azur ! Eau turquoise dans une baie protégée. Ça vaut le détour.</p>\n<blockquote>\n<p>💡 <strong>Tip :</strong> Les plages privées proposent généralement un transat + parasol pour 15-25 €/jour. Le restaurant est un plus mais pas obligatoire.</p>\n</blockquote>\n<hr>\n","quartier":"<p><img src=\"images/vue-panoramique-fabron.jpg\" alt=\"Vue panoramique depuis Fabron — la baie, le Cap de Nice\"></p>\n<h3>🍽️ Restaurants du quartier (à pied)</h3>\n<h4>⭐ <strong>NÂGA Street-food Nice Ouest</strong> · € · 4.9</h4>\n<p>Street-food asiatique — Petit mais incroyable — saveurs authentiques, portions généreuses. Coup de cœur !</p>\n<h4>⭐ <strong>La Pignata</strong> · €-€€ · 4.1</h4>\n<p>Brasserie / Pizzeria — Brasserie de quartier pratique, terrasse agréable. Pizzas correctes.</p>\n<h4>⭐ <strong>Chez Cane</strong> · €€ · 4.4</h4>\n<p>Niçoise traditionnelle — Terrasse verdoyante, civet de sanglier et gnocchis maison — une institution du quartier !</p>\n<h4>⭐ <strong>Club House du Ciel de Fabron</strong> · €€ · 4.9</h4>\n<p>Française — Vue imprenable ! Cadre exceptionnel sur les hauteurs avec panorama mer. Réservez !</p>\n<h4>⭐ <strong>Le Potiron Gourmet</strong> · €€ · 4.8</h4>\n<p>Française créative — Cuisine maison raffinée, produits frais du marché. Ambiance intimiste.</p>\n<h4>🟢⚪🔴 <strong>CASA LASAGNA</strong> · €€ · 4.8</h4>\n<p>Italien — Lasagnes divines comme en Italie ! Pâtes fraîches, accueil chaleureux.</p>\n<h4>⭐ <strong>Sushi Fabron</strong> · €€ · 4.8</h4>\n<p>Japonais — Le meilleur sushi du quartier, produits ultra-frais. Parfait pour un soir tranquille.</p>\n<h3>🛒 Courses &amp; Commerces</h3>\n<p><strong>🏪 Dépannage (petit) :</strong></p>\n<ul>\n<li><strong>Carrefour City</strong> (106 av. de la Californie) — ~6 min à pied en descente. Pratique pour le pain, le lait, les urgences, mais choix limité et prix élevés.</li>\n</ul>\n<p><strong>🛒 Vrais supermarchés (courses complètes) :</strong></p>\n<table>\n<thead>\n<tr>\n<th>Lieu</th>\n<th>Adresse</th>\n<th>À pied</th>\n<th>En tram L2</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Carrefour Market</strong></td>\n<td>258 av. de la Californie</td>\n<td>~21 min</td>\n<td>~15 min (arrêt Sainte-Marguerite)</td>\n</tr>\n<tr>\n<td><strong>Intermarché SUPER</strong></td>\n<td>2 Bd René Cassin</td>\n<td>~28 min</td>\n<td>~17 min (arrêt Las Planas)</td>\n</tr>\n</tbody></table>\n<blockquote>\n<p>💡 <strong>Notre conseil :</strong> Pour les grosses courses, prenez le tram L2 jusqu&#39;à l&#39;un des deux supermarchés. L&#39;Intermarché est le plus grand et le moins cher. Pour le dépannage quotidien, le Carrefour City en bas suffit.</p>\n</blockquote>\n<h3>💊 Santé</h3>\n<ul>\n<li><strong>Pharmacie</strong> : Plusieurs pharmacies sur l&#39;avenue de la Californie et av. de Fabron</li>\n<li><strong>Urgences adultes</strong> : Hôpital l&#39;Archet (CHU Nice), 151 route Saint-Antoine de Ginestière — ☎ 04 92 03 77 77</li>\n<li><strong>Urgences pédiatriques (enfants)</strong> : Hôpital Lenval, 57 av. de la Californie — à 2 arrêts de tram (arrêt Lenval) — ☎ 04 92 03 03 03</li>\n<li><strong>SOS Médecins Nice</strong> : ☎ 04 93 85 01 01 (visites 24h/24)</li>\n<li><strong>SAMU / Urgences</strong> : ☎ 15</li>\n</ul>\n<h3>🏖️ Accès plage</h3>\n<p>Depuis le studio, prenez le raccourci escalier jusqu&#39;à l&#39;arrêt Sainte-Hélène (~5 min), puis descendez vers la Promenade des Anglais : <strong>~10 minutes à pied au total</strong>. Vous arrivez sur les <strong>plages publiques de Fabron/Carras</strong> — moins bondées que celles du centre !</p>\n<h3>🌳 À côté</h3>\n<ul>\n<li><strong>Musée d&#39;Art Naïf Anatole Jakovsky</strong> (Château Sainte-Hélène) — juste à côté, parc magnifique pour se balader</li>\n<li><strong>Abbaye de Roseland</strong> — jardin botanique classé, à quelques minutes à pied</li>\n<li><strong>Parc Carol de Roumanie</strong> — espace vert familial</li>\n<li><strong>Centre AnimaNice Fabron</strong> — centre culturel et sportif du quartier, activités toute l&#39;année</li>\n</ul>\n<h3>🚶 Balades &amp; Sport dans le quartier</h3>\n<ul>\n<li><strong>Boucle Acti&#39;Santé Fabron</strong> — parcours patrimoine botanique du quartier (<a href=\"https://www.nice.fr/sport/parcours/\">nice.fr/sport/parcours</a>)</li>\n<li><strong>Balade des collines de Fabron</strong> — circuit rando avec panorama baie des Anges (<a href=\"https://www.visorando.com/randonnee-dans-le-quartier-de-fabron-a-nice/\">visorando.com</a>)</li>\n<li><strong>Promenade des Anglais</strong> — à ~10 min à pied (via le raccourci escalier), idéale pour courir, marcher ou faire du vélo</li>\n</ul>\n<hr>\n"};
    const PUBLIC_EN = {"bienvenue":"<p>Welcome to our place and welcome to Nice! 🎉</p>\n<p>You&#39;ve picked an amazing neighbourhood. <strong>Fabron</strong> is one of Nice&#39;s best-kept secrets: residential, peaceful, green, yet close to everything. No tourist crowds here — you&#39;ll live like a true local!</p>\n<p>Your studio is south-facing with a <strong>sea-view balcony</strong> 🌊 — you&#39;ll enjoy sunshine all day long.</p>\n<p>You&#39;re about 7 minutes on foot from the <strong>Fabron</strong> tram stop (Line L2), connecting you in minutes to the city centre, the Promenade des Anglais, and even the airport.</p>\n<p>Make yourself at home, breathe in the Mediterranean air, and enjoy! This guide is here to help you discover the best of Nice and the French Riviera. 🌊</p>\n<blockquote>\n<p>📌 <strong>Our Airbnb listing:</strong> <a href=\"https://airbnb.com/h/fabron\">airbnb.com/h/fabron</a></p>\n</blockquote>\n<blockquote>\n<p>🔑 Residence and apartment access information can be found in the <strong>Apartment</strong> section (password-protected).</p>\n</blockquote>\n<h2>Guide Navigation</h2>\n<h3>🚃 <strong>Transport</strong></h3>\n<p>How to get around Nice: tram, buses, bikes, and all the best tips for easy travel in the city and surroundings.</p>\n<h3>🏘️ <strong>Area</strong></h3>\n<p>Discover Fabron and its surroundings: local shops, neighborhood restaurants, and hidden local gems.</p>\n<h3>🏛️ <strong>Nice</strong></h3>\n<p>The city&#39;s must-sees: Old Town, museums, markets, and all the spots you can&#39;t miss for a true Nice experience.</p>\n<h3>🍽️ <strong>Dining</strong></h3>\n<p>Our best addresses for every budget: from authentic bistros to Michelin-starred tables, with local specialties you absolutely must try.</p>\n<h3>🏖️ <strong>Beaches</strong></h3>\n<p>The complete guide to Nice&#39;s beaches: public, private, with or without restaurants, to find your perfect Mediterranean paradise spot.</p>\n<h3>🔑 <strong>Apartment</strong></h3>\n<p>All practical information for your stay: access, equipment, WiFi, and tips to make the most of your studio.</p>\n<hr>\n","transports":"<h3>🚋 Tramway — Your Best Friend!</h3>\n<p><strong>Line L2</strong> runs right below the residence! Nearest stop:</p>\n<ul>\n<li><strong>Fabron</strong> — ~7 min walk (down the avenue)</li>\n<li>💡 <strong>Shortcut</strong> 🚶‍♀️: there&#39;s a stairway in the residence leading straight down to the tram and the sea (see Apartment section for details)!</li>\n</ul>\n<p><strong>Where it goes from Fabron stop:</strong></p>\n<table>\n<thead>\n<tr>\n<th>Destination</th>\n<th>Time</th>\n<th>Direction</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Airport Terminal 2</td>\n<td>~15 min</td>\n<td>→ Airport</td>\n</tr>\n<tr>\n<td>Phoenix Park</td>\n<td>~9 min</td>\n<td>→ Airport</td>\n</tr>\n<tr>\n<td>City centre (Jean Médecin)</td>\n<td>~10 min</td>\n<td>→ Port Lympia</td>\n</tr>\n<tr>\n<td>Promenade des Anglais (CUM)</td>\n<td>~6 min</td>\n<td>→ Port Lympia</td>\n</tr>\n<tr>\n<td>Old Town (Garibaldi)</td>\n<td>~13 min</td>\n<td>→ Port Lympia</td>\n</tr>\n<tr>\n<td>Nice Port (Port Lympia)</td>\n<td>~15 min</td>\n<td>→ Port Lympia</td>\n</tr>\n</tbody></table>\n<p><strong>Hours:</strong> ~4:30am to 1:30am, every 5-8 minutes during the day<br><strong>Fare:</strong> €1.50 per ticket (valid 74 min, transfers included), €15 for a 7-day pass — buy at machines or via the <strong>Lignes d&#39;Azur</strong> app (<a href=\"http://itunes.apple.com/fr/app/lignes-dazur-mobile/id423316741?mt=8\">App Store</a> / <a href=\"https://play.google.com/store/apps/details?id=fr.cityway.android.st2n\">Google Play</a>)</p>\n<blockquote>\n<p>💡 <strong>Tip:</strong> Always validate your ticket when boarding! Inspectors are frequent.</p>\n</blockquote>\n<p><strong>Line L3</strong> also serves the same stops and extends towards Saint-Isidore.</p>\n<h3>🚂 Train Stations</h3>\n<p>The train station and airport are only <strong>3 km</strong> away!</p>\n<p><strong>Nice Saint-Augustin station</strong> <em>(closest)</em>: Tram L2 → Parc Phoenix stop (~9 min), then 5 min walk.</p>\n<table>\n<thead>\n<tr>\n<th>Destination</th>\n<th>Duration</th>\n<th>Approx. Price</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Antibes</strong></td>\n<td>~15 min</td>\n<td>~€4</td>\n</tr>\n<tr>\n<td><strong>Cannes</strong></td>\n<td>~24 min</td>\n<td>~€6</td>\n</tr>\n<tr>\n<td><strong>Monaco</strong></td>\n<td>~35 min</td>\n<td>~€5</td>\n</tr>\n<tr>\n<td><strong>Menton</strong></td>\n<td>~45 min</td>\n<td>~€7</td>\n</tr>\n<tr>\n<td><strong>Saint-Raphaël</strong></td>\n<td>~55 min</td>\n<td>~€12</td>\n</tr>\n</tbody></table>\n<p><strong>Nice-Ville station</strong> <em>(main station, TGV)</em>: Tram L2 → Jean Médecin (~10 min), then 10 min walk or L1 connection. Paris, Marseille, Lyon, Milan...</p>\n<blockquote>\n<p>💡 <strong>Tip:</strong> Buy TER tickets on the <strong>SNCF Connect</strong> app or at station machines. Trains run very frequently (every 20-30 min).</p>\n</blockquote>\n<h3>🚌 Bus</h3>\n<ul>\n<li><strong>Lignes d&#39;Azur</strong> network — same ticket as the tram (€1.50)</li>\n<li><strong>Bus 12+</strong>: serves avenue de la Californie / Fabron Promenade → Cap 3000</li>\n</ul>\n<h3>🚗 Car</h3>\n<ul>\n<li><strong>Parking</strong>: your spot is included in the residence</li>\n<li><strong>Traffic</strong>: avoid the Promenade des Anglais during rush hour!</li>\n<li><strong>Rentals</strong>: agencies at the airport (Europcar, Hertz, Sixt…)</li>\n</ul>\n<h3>🛴 Bikes &amp; Scooters</h3>\n<ul>\n<li><strong>Vélo Bleu</strong>: bike-sharing service, stations across Nice</li>\n<li><strong>Dott / Lime</strong>: electric scooters (download the app)</li>\n</ul>\n<hr>\n","restaurants":"<blockquote>\n<p>🏘️ <strong>Neighbourhood restaurants in Fabron</strong> → see the <strong>Area</strong> tab!</p>\n</blockquote>\n<blockquote>\n<p>🥘 <strong>Must-try Nice specialities:</strong> Socca (chickpea flatbread), pissaladière (onion &amp; anchovy tart), salade niçoise, petits farcis (stuffed vegetables), ratatouille, pan bagnat (Niçoise sandwich), tourte de blettes (sweet Swiss chard pie!).</p>\n</blockquote>\n<h3>🏙️ City Centre / Old Town Nice (10-15 min by tram L2)</h3>\n<p><em>Take tram L2 from Fabron stop — get off at Jean Médecin, Garibaldi or Port Lympia depending on the restaurant!</em></p>\n<h4>🔥 <strong>Chez Pipo</strong> · € · Port</h4>\n<p>Socca &amp; Niçoise — THE socca in Nice since 1923! A must-try, wood-fired. Rustic and authentic atmosphere.</p>\n<p><em>13 rue Bavastro</em></p>\n<h4><strong>Chez René Socca</strong> · € · Old Town</h4>\n<p>Socca &amp; Niçoise — The other socca institution! Lively terrace, pissaladière and petits farcis. Queue = good sign!</p>\n<p><em>2 rue Miralheti</em></p>\n<h4><strong>Sweet Sisters</strong> · € · Centre</h4>\n<p>Healthy / Pastry — Build-your-own salads, incredible carrot cake! Colourful and fresh, perfect for a light lunch.</p>\n<p><em>City centre</em></p>\n<h4><strong>Chez Acchiardo</strong> · €€ · Old Town</h4>\n<p>Family Niçoise — Family atmosphere since 1927, authentic Niçoise cuisine. Daube, ravioli, tripe. Locals love it.</p>\n<p><em>38 rue Droite</em></p>\n<h4><strong>La Merenda</strong> · €€ · Old Town</h4>\n<p>Purist Niçoise — Tiny, no phone, no cards — cash only and real Niçoise cooking. For purists!</p>\n<p><em>4 rue Raoul Bosio</em></p>\n<h4><strong>Le Safari</strong> · €€ · Cours Saleya</h4>\n<p>Mediterranean — Iconic terrace facing the flower market. Perfect for a summer evening dinner.</p>\n<p><em>1 Cours Saleya</em></p>\n<h4><strong>La Storia</strong> · €€ · Cours Saleya</h4>\n<p>Gourmet Niçoise — Beautiful sunny terrace, Niçoise specialities (pissaladière, daube). Kids&#39; menu available.</p>\n<p><em>Cours Saleya</em></p>\n<h4><strong>Les Épicuriens</strong> · €€-€€€ · Jean Médecin</h4>\n<p>Bistronomic — Fine seasonal cuisine, sublime octopus. ~€40/person. Booking recommended.</p>\n<p><em>Jean Médecin area</em></p>\n<h4><strong>Peixes</strong> · €€-€€€ · Centre</h4>\n<p>Fish / Seafood — Marine atmosphere, modern seafood-focused menu. Mediterranean and South American flavours.</p>\n<p><em>City centre</em></p>\n<h4>⭐ <strong>Restaurant JAN</strong> · €€€€ · Port Lympia</h4>\n<p>Fine Dining (1 Michelin star) — Unique Franco-South African culinary experience. 7-course menu ~€165-195. For a special evening. Booking essential.</p>\n<p><em>Near the Port</em></p>\n<h3>🍕 Price Guide</h3>\n<ul>\n<li><strong>€</strong> = under €15 per person</li>\n<li><strong>€€</strong> = €15-30 per person</li>\n<li><strong>€€€</strong> = €30-60 per person</li>\n<li><strong>€€€€</strong> = over €60 per person</li>\n</ul>\n<blockquote>\n<p>💡 <strong>Tip:</strong> In France, service charge is included in the bill. Tipping isn&#39;t mandatory, but rounding up or leaving 5-10% for exceptional service is appreciated.</p>\n</blockquote>\n<blockquote>\n<p>💡 <strong>Tip:</strong> Most restaurants are open at typical hours: lunch (12-2pm) then dinner (7-10:30pm). Some restaurants stay open continuously.</p>\n</blockquote>\n<hr>\n","nice":"<h3>🌊 Promenade des Anglais</h3>\n<p>The legendary &quot;Prom&quot;! 7 km of palm-lined seafront, from the airport to Old Town Nice. Perfect for walking, jogging, cycling or rollerblading. Magical at sunset. 🌅</p>\n<ul>\n<li><strong>From the studio:</strong> 10-15 min walk downhill to the sea</li>\n<li><strong>Tip:</strong> The famous blue chairs facing the sea are free — sit and enjoy!</li>\n</ul>\n<h3>🏘️ Old Town Nice (Vieux-Nice)</h3>\n<p>An enchanting maze of colourful narrow streets, Baroque architecture, ochre and red façades. Wander without a plan, get lost — that&#39;s the best way to discover it!</p>\n<ul>\n<li><strong>Sainte-Réparate Cathedral</strong> — beautiful 17th-century Baroque</li>\n<li><strong>Chapel of Mercy</strong> — masterpiece of sacred art</li>\n<li><strong>Tram:</strong> Garibaldi or Opéra/Vieille Ville stops</li>\n</ul>\n<h3>🌸 Cours Saleya — The Market</h3>\n<p>THE unmissable gathering spot! Flower and fresh produce market in a stunning setting.</p>\n<ul>\n<li><strong>Open:</strong> Every day except Monday (flea market on Mondays)</li>\n<li><strong>Hours:</strong> ~6am-5:30pm (flowers), ~6am-1:30pm (food)</li>\n<li><strong>Tip:</strong> Try the olives, socca, pissaladière right at the market!</li>\n</ul>\n<h3>🏔️ Castle Hill (Colline du Château)</h3>\n<p>360° panoramic view over Nice, the port, the Bay of Angels and the Alps. THE viewpoint!</p>\n<ul>\n<li><strong>Access:</strong> Stairs from Old Town, OR <strong>free elevator</strong> (Tour Bellanda, Quai des États-Unis)</li>\n<li><strong>Waterfall</strong> at the top, playgrounds, archaeological remains</li>\n<li><strong>Free</strong> — Open daily</li>\n</ul>\n<h3>🎨 MAMAC — Museum of Modern and Contemporary Art</h3>\n<p>Exceptional collection: Yves Klein, Niki de Saint Phalle, Warhol, Lichtenstein...</p>\n<ul>\n<li><strong>Address:</strong> Place Yves Klein (near Garibaldi)</li>\n<li><strong>Price:</strong> <strong>FREE!</strong> 🎉</li>\n<li><strong>Closed Mondays</strong></li>\n</ul>\n<h3>🎨 Matisse Museum</h3>\n<p>Dedicated to Henri Matisse who lived in Nice. Magnificent collection in a 17th-century Genoese villa, in the Cimiez gardens.</p>\n<ul>\n<li><strong>Price:</strong> Free!</li>\n<li><strong>Tram L1:</strong> Les Arènes / Musée Matisse stop</li>\n<li><strong>Bonus:</strong> Also visit the <strong>Roman Arenas of Cimiez</strong> right next door</li>\n</ul>\n<h3>🎨 Marc Chagall National Museum</h3>\n<p>The world&#39;s largest collection of Chagall&#39;s works. The stained glass windows are extraordinary.</p>\n<ul>\n<li><strong>Address:</strong> Avenue Docteur Ménard</li>\n<li><strong>Price:</strong> ~€8 (free under 26 EU citizens)</li>\n</ul>\n<h3>🏛️ Place Masséna</h3>\n<p>Nice&#39;s main square — fountains, colourful statues on their poles (&quot;Conversation à Nice&quot; by Jaume Plensa), red Belle Époque architecture.</p>\n<ul>\n<li><strong>At night:</strong> Illuminated, wonderful atmosphere</li>\n</ul>\n<h3>⛵ Nice Port (Port Lympia)</h3>\n<p>Beautiful colourful harbour, yachts and fishing boats. Excellent restaurants and bars on the quays.</p>\n<ul>\n<li><strong>Tram L2:</strong> Port Lympia terminus</li>\n</ul>\n<h3>🥕 Liberation Market (Marché de la Libération)</h3>\n<p>The real locals&#39; market! Less touristy than Cours Saleya, more authentic.</p>\n<ul>\n<li><strong>Open:</strong> Every morning except Monday, ~6am-1pm</li>\n<li><strong>Tram L1:</strong> Libération stop</li>\n</ul>\n<h3>🌴 Phoenix Park</h3>\n<p>Large tropical botanical garden with a giant greenhouse (one of Europe&#39;s largest!), animals, lakes.</p>\n<ul>\n<li><strong>Address:</strong> 405 Promenade des Anglais</li>\n<li><strong>Price:</strong> ~€5</li>\n<li><strong>Tram L2:</strong> Parc Phoenix stop (just a few stops from your place!)</li>\n</ul>\n<h3>🎯 Activities &amp; Day Trips (Summer)</h3>\n<p><strong>🚤 Boat Trips</strong></p>\n<ul>\n<li>Coastal boat rides, hidden coves, swimming stops</li>\n<li>Excursions to Saint-Jean-Cap-Ferrat, Monaco, Lérins Islands</li>\n<li>📱 Book: <a href=\"https://www.getyourguide.com/nice-l314/\">GetYourGuide Nice</a> | <a href=\"https://www.viator.com/Nice/d478-ttd\">Viator Nice</a> | <a href=\"https://www.explorenicecotedazur.com/en/explore/discovery-tours/boat-trips/\">Trans Côte d&#39;Azur</a></li>\n</ul>\n<p><strong>🚗 Day Trips</strong></p>\n<ul>\n<li><strong>Monaco</strong> — 20 min by train, the Rock, Casino, Exotic Garden</li>\n<li><strong>Èze</strong> — perched village, breathtaking views, Fragonard perfumery</li>\n<li><strong>Antibes / Juan-les-Pins</strong> — ramparts, Picasso museum, sandy beaches</li>\n<li><strong>Cannes</strong> — La Croisette, Le Suquet old town, Lérins Islands</li>\n<li><strong>Saint-Paul-de-Vence</strong> — artists&#39; village, Maeght Foundation</li>\n<li><strong>Gorges du Verdon</strong> — spectacular canyon (~2h drive)</li>\n<li><strong>Ventimiglia Market</strong> (Italy) — Friday mornings, 40 min by train, shopping &amp; Italian products</li>\n<li>📱 Book: <a href=\"https://www.getyourguide.com/nice-l314/\">GetYourGuide</a> | <a href=\"https://www.viator.com/Nice/d478-ttd\">Viator</a></li>\n</ul>\n<p><strong>🎭 Summer 2026 Events</strong></p>\n<ul>\n<li><strong>Fête de la Musique</strong> — June 21 🎶 (free concerts everywhere in Nice!)</li>\n<li><strong>La Crème Festival</strong> — June 26-28, Villefranche-sur-Mer (music, gastronomy, outdoors)</li>\n<li><strong>Nice Jazz Festival</strong> — July (one of the world&#39;s oldest jazz festivals!)</li>\n<li><strong>Fireworks</strong> — July-August on the Promenade des Anglais</li>\n<li><strong>Lavender Festival</strong> — July-August, Valensole (lavender fields, ~2h drive)</li>\n<li>📱 Full calendar: <a href=\"https://www.explorenicecotedazur.com/preparer/nos-grands-evenements/agenda/\">explorenicecotedazur.com/events</a> | <a href=\"https://cotedazurfrance.fr/decouvrir/grands-evenements/\">cotedazurfrance.fr</a></li>\n</ul>\n<p><strong>🏊 Rentals &amp; Sports</strong></p>\n<ul>\n<li><strong>Vélos Bleus</strong> — city bike-share across Nice</li>\n<li>Bike / e-bike / scooter rental: many shops in the city centre</li>\n<li>Diving, kayaking, paddleboarding — from beaches or the port</li>\n<li>📱 Browse: <a href=\"https://www.tripadvisor.com/Attractions-g187234-Activities-Nice_French_Riviera_Cote_d_Azur_Provence_Alpes_Cote_d_Azur.html\">TripAdvisor Nice activities</a></li>\n</ul>\n<hr>\n","plages":"<h3>⚠️ Important to know first!</h3>\n<p>Nice beaches are <strong>pebble</strong> beaches (no sand!). You get used to it quickly, but bring:</p>\n<ul>\n<li>👟 <strong>Water shoes</strong> (sold everywhere in Nice, ~€5-10)</li>\n<li>🏖️ <strong>Beach mat</strong> (comfort on the pebbles!)</li>\n<li>🧴 Sunscreen (the sun is strong here)</li>\n</ul>\n<h3>🏖️ Beaches Near the Studio</h3>\n<p><strong>Fabron / Carras Beaches</strong> <em>(~11 min walk via the shortcut)</em> 🏅</p>\n<ul>\n<li>✅ <strong>Public and free</strong></li>\n<li>✅ Less crowded than the city centre</li>\n<li>✅ Clear, clean water</li>\n<li>Showers and sea access facilities in places</li>\n<li>This is your neighbourhood beach — enjoy it!</li>\n</ul>\n<h3>🏖️ City Centre Beaches</h3>\n<h4>Public beaches (free)</h4>\n<table>\n<thead>\n<tr>\n<th>Beach</th>\n<th>Highlight</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Ponchettes Beach</strong></td>\n<td>Right in Old Town, lively atmosphere</td>\n</tr>\n<tr>\n<td><strong>Centenaire Beach</strong></td>\n<td>Facing Jardin Albert 1er, well-maintained</td>\n</tr>\n</tbody></table>\n<h4>Private beaches</h4>\n<h4><strong>Blue Beach</strong> · €€</h4>\n<p>Great vibe, music, cocktails</p>\n<h4><strong>Castel Plage</strong> · €€</h4>\n<p>Facing Old Town, restaurant on-site</p>\n<h4><strong>Beau Rivage</strong> · €€€</h4>\n<p>Restaurant, loungers, luxury beach service</p>\n<h3>🏖️ The Secret Gem</h3>\n<p><strong>Villefranche-sur-Mer</strong> <em>(20 min by car or bus)</em> — One of the rare <strong>sandy beaches</strong> on the French Riviera! Turquoise water in a sheltered bay. Worth the trip.</p>\n<blockquote>\n<p>💡 <strong>Tip:</strong> Private beaches typically offer a lounger + parasol for €15-25/day. The restaurant is a bonus but not mandatory.</p>\n</blockquote>\n<hr>\n","quartier":"<p><img src=\"images/vue-panoramique-fabron.jpg\" alt=\"Panoramic view from Fabron — the bay, Cap de Nice\"></p>\n<h3>🍽️ Neighbourhood Restaurants (walking distance)</h3>\n<h4>⭐ <strong>NÂGA Street-food Nice Ouest</strong> · € · 4.9</h4>\n<p>Asian street food — Small but amazing — authentic flavours, generous portions. A real gem!</p>\n<h4>⭐ <strong>La Pignata</strong> · €-€€ · 4.1</h4>\n<p>Brasserie / Pizzeria — Handy local brasserie, nice terrace. Decent pizzas.</p>\n<h4>⭐ <strong>Chez Cane</strong> · €€ · 4.4</h4>\n<p>Traditional Niçoise — Lush terrace, wild boar stew and homemade gnocchi — a neighbourhood institution!</p>\n<h4>⭐ <strong>Club House du Ciel de Fabron</strong> · €€ · 4.9</h4>\n<p>French — Incredible views! Exceptional hilltop setting with sea panorama. Book ahead!</p>\n<h4>⭐ <strong>Le Potiron Gourmet</strong> · €€ · 4.8</h4>\n<p>Creative French — Refined homemade cuisine, fresh market produce. Intimate atmosphere.</p>\n<h4>🟢⚪🔴 <strong>CASA LASAGNA</strong> · €€ · 4.8</h4>\n<p>Italian — Divine lasagnas just like Italy! Fresh pasta, warm welcome.</p>\n<h4>⭐ <strong>Sushi Fabron</strong> · €€ · 4.8</h4>\n<p>Japanese — Best sushi in the area, ultra-fresh products. Perfect for a quiet evening.</p>\n<h3>🛒 Shopping &amp; Essentials</h3>\n<p><strong>🏪 Convenience stores (small, for basics):</strong></p>\n<ul>\n<li><strong>Carrefour City</strong> (106 av. de la Californie) — ~6 min walk downhill. Great for bread, milk, essentials, but limited selection and higher prices.</li>\n</ul>\n<p><strong>🛒 Full supermarkets (for proper shopping):</strong></p>\n<table>\n<thead>\n<tr>\n<th>Place</th>\n<th>Address</th>\n<th>On foot</th>\n<th>By tram L2</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Carrefour Market</strong></td>\n<td>258 av. de la Californie</td>\n<td>~21 min</td>\n<td>~15 min (Sainte-Marguerite stop)</td>\n</tr>\n<tr>\n<td><strong>Intermarché SUPER</strong></td>\n<td>2 Bd René Cassin</td>\n<td>~28 min</td>\n<td>~17 min (Las Planas stop)</td>\n</tr>\n</tbody></table>\n<blockquote>\n<p>💡 <strong>Our tip:</strong> For big shops, hop on tram L2 to either supermarket. Intermarché is the largest and cheapest. For daily essentials, the Carrefour City downhill will do.</p>\n</blockquote>\n<h3>💊 Health</h3>\n<ul>\n<li><strong>Pharmacy</strong>: Several pharmacies on avenue de la Californie and av. de Fabron</li>\n<li><strong>Adult A&amp;E</strong>: Hôpital l&#39;Archet (CHU Nice), 151 route Saint-Antoine de Ginestière — ☎ 04 92 03 77 77</li>\n<li><strong>Children&#39;s A&amp;E (paediatric)</strong>: Hôpital Lenval, 57 av. de la Californie — 2 tram stops away (Lenval stop) — ☎ 04 92 03 03 03</li>\n<li><strong>SOS Doctors Nice</strong>: ☎ 04 93 85 01 01 (house calls 24/7)</li>\n<li><strong>Emergency services</strong>: ☎ 15 (SAMU) or 112 (European emergency number)</li>\n</ul>\n<h3>🏖️ Beach Access</h3>\n<p>From the studio, take the shortcut stairs down to the Sainte-Hélène stop (~5 min), then walk to the Promenade des Anglais: <strong>~10 minutes total on foot</strong>. You&#39;ll reach the <strong>Fabron/Carras public beaches</strong> — less crowded than the city centre ones!</p>\n<h3>🌳 Nearby</h3>\n<ul>\n<li><strong>Anatole Jakovsky Museum of Naïve Art</strong> (Château Sainte-Hélène) — right next door, beautiful park for strolling</li>\n<li><strong>Roseland Abbey</strong> — classified botanical garden, a few minutes&#39; walk</li>\n<li><strong>Carol de Roumanie Park</strong> — family-friendly green space</li>\n<li><strong>Centre AnimaNice Fabron</strong> — local cultural and sports centre, activities all year</li>\n</ul>\n<h3>🚶 Walks &amp; Sports in the Area</h3>\n<ul>\n<li><strong>Acti&#39;Santé Fabron loop</strong> — heritage &amp; botanical neighbourhood walk (<a href=\"https://www.nice.fr/sport/parcours/\">nice.fr/sport/parcours</a>)</li>\n<li><strong>Fabron Hills Walk</strong> — hiking trail with panoramic Bay of Angels views (<a href=\"https://www.visorando.com/randonnee-dans-le-quartier-de-fabron-a-nice/\">visorando.com</a>)</li>\n<li><strong>Promenade des Anglais</strong> — ~10 min walk (via the shortcut stairs), perfect for running, walking or cycling</li>\n</ul>\n<hr>\n"};
    const PUBLIC_ES = {"bienvenue":"<p>¡Bienvenidos a nuestra casa y bienvenidos a Niza! 🎉</p>\n<p>Han elegido un barrio fantástico. <strong>Fabron</strong> es uno de los secretos mejor guardados de Niza: residencial, tranquilo, verde, y aún así cerca de todo. Aquí no hay multitudes de turistas — ¡vivirán como auténticos niçois!</p>\n<p>Su estudio está orientado al sur con <strong>balcón con vista al mar</strong> 🌊 — disfrutarán del sol durante todo el día.</p>\n<p>Están a unos 7 minutos caminando de la parada de tranvía <strong>Fabron</strong> (línea L2), que los conecta rápidamente al centro de la ciudad, a la Promenade des Anglais e incluso al aeropuerto.</p>\n<p>Pónganse cómodos, respiren el aire mediterráneo, ¡y disfruten! Esta guía está aquí para ayudarlos a descubrir lo mejor de Niza y la Costa Azul. 🌊</p>\n<blockquote>\n<p>📌 <strong>Nuestro anuncio de Airbnb:</strong> <a href=\"https://airbnb.com/h/fabron\">airbnb.com/h/fabron</a></p>\n</blockquote>\n<blockquote>\n<p>🔑 La información de acceso a la residencia y al apartamento se encuentra en la sección <strong>Apartamento</strong> (protegida con contraseña).</p>\n</blockquote>\n<h2>Navegación de la Guía</h2>\n<h3>🚃 <strong>Transporte</strong></h3>\n<p>Cómo moverse por Niza: tranvía, autobuses, bicicletas, y todos los mejores consejos para viajar fácilmente por la ciudad y sus alrededores.</p>\n<h3>🏘️ <strong>Barrio</strong></h3>\n<p>Descubran Fabron y sus alrededores: comercios locales, restaurantes del barrio, y las pequeñas direcciones escondidas.</p>\n<h3>🏛️ <strong>Niza</strong></h3>\n<p>Los imprescindibles de la ciudad: Casco Antiguo, museos, mercados, y todos los lugares que no pueden perderse para una verdadera experiencia niçoise.</p>\n<h3>🍽️ <strong>Restaurantes</strong></h3>\n<p>Nuestras mejores direcciones para todos los presupuestos: desde bistrós auténticos hasta mesas con estrella Michelin, con las especialidades locales que deben probar absolutamente.</p>\n<h3>🏖️ <strong>Playas</strong></h3>\n<p>La guía completa de las playas de Niza: públicas, privadas, con o sin restaurante, para encontrar su rincón perfecto del paraíso mediterráneo.</p>\n<h3>🔑 <strong>Apartamento</strong></h3>\n<p>Toda la información práctica para su estancia: acceso, equipamiento, WiFi, y consejos para aprovechar al máximo su estudio.</p>\n","transports":"<h3>🚋 Tranvía — ¡Su Mejor Amigo!</h3>\n<p>¡La <strong>Línea L2</strong> pasa justo debajo de la residencia! Parada más cercana:</p>\n<ul>\n<li><strong>Fabron</strong> — a ~7 min caminando (bajar por la avenida)</li>\n<li>💡 <strong>Atajo</strong> 🚶‍♀️: ¡hay una escalera en la residencia que baja directamente al tranvía y al mar (ver sección Apartamento para los detalles)!</li>\n</ul>\n<p><strong>Adónde va desde la parada Fabron:</strong></p>\n<table>\n<thead>\n<tr>\n<th>Destino</th>\n<th>Tiempo</th>\n<th>Dirección</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Aeropuerto Terminal 2</td>\n<td>~15 min</td>\n<td>→ Aeropuerto</td>\n</tr>\n<tr>\n<td>Parque Phoenix</td>\n<td>~9 min</td>\n<td>→ Aeropuerto</td>\n</tr>\n<tr>\n<td>Centro de la ciudad (Jean Médecin)</td>\n<td>~10 min</td>\n<td>→ Port Lympia</td>\n</tr>\n<tr>\n<td>Promenade des Anglais (CUM)</td>\n<td>~6 min</td>\n<td>→ Port Lympia</td>\n</tr>\n<tr>\n<td>Casco Antiguo (Garibaldi)</td>\n<td>~13 min</td>\n<td>→ Port Lympia</td>\n</tr>\n<tr>\n<td>Puerto de Niza (Port Lympia)</td>\n<td>~15 min</td>\n<td>→ Port Lympia</td>\n</tr>\n</tbody></table>\n<p><strong>Horarios:</strong> ~4:30 a 1:30 de la madrugada, cada 5-8 minutos durante el día<br><strong>Tarifa:</strong> 1,50 € el billete (válido 74 min, transbordos incluidos), 15 € el pase de 7 días — compren en las máquinas o vía la app <strong>Lignes d&#39;Azur</strong> (<a href=\"http://itunes.apple.com/fr/app/lignes-dazur-mobile/id423316741?mt=8\">App Store</a> / <a href=\"https://play.google.com/store/apps/details?id=fr.cityway.android.st2n\">Google Play</a>)</p>\n<blockquote>\n<p>💡 <strong>Consejo:</strong> ¡Validen siempre su billete al subir! Controles frecuentes.</p>\n</blockquote>\n<p>La <strong>Línea L3</strong> también pasa por las mismas paradas y se extiende hacia Saint-Isidore.</p>\n<h3>🚂 Estaciones SNCF</h3>\n<p>¡La estación y el aeropuerto están a solo <strong>3 km</strong>!</p>\n<p><strong>Estación Nice Saint-Augustin</strong> <em>(la más cercana)</em>: Tranvía L2 → parada Parc Phoenix (~9 min), luego 5 min caminando.</p>\n<table>\n<thead>\n<tr>\n<th>Destino</th>\n<th>Duración</th>\n<th>Precio aprox.</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Antibes</strong></td>\n<td>~15 min</td>\n<td>~4 €</td>\n</tr>\n<tr>\n<td><strong>Cannes</strong></td>\n<td>~24 min</td>\n<td>~6 €</td>\n</tr>\n<tr>\n<td><strong>Mónaco</strong></td>\n<td>~35 min</td>\n<td>~5 €</td>\n</tr>\n<tr>\n<td><strong>Menton</strong></td>\n<td>~45 min</td>\n<td>~7 €</td>\n</tr>\n<tr>\n<td><strong>Saint-Raphaël</strong></td>\n<td>~55 min</td>\n<td>~12 €</td>\n</tr>\n</tbody></table>\n<p><strong>Estación Nice-Ville</strong> <em>(estación principal, TGV)</em>: Tranvía L2 → Jean Médecin (~10 min), luego 10 min caminando o conexión L1. París, Marsella, Lyon, Milán...</p>\n<blockquote>\n<p>💡 <strong>Consejo:</strong> Compren sus billetes TER en la app <strong>SNCF Connect</strong> o en las máquinas de la estación. Trenes muy frecuentes (cada 20-30 min).</p>\n</blockquote>\n<h3>🚌 Autobús</h3>\n<ul>\n<li>Red <strong>Lignes d&#39;Azur</strong> — mismo billete que el tranvía (1,50 €)</li>\n<li><strong>Autobús 12+</strong>: recorre la avenue de la Californie / Fabron Promenade → Cap 3000</li>\n</ul>\n<h3>🚗 Coche</h3>\n<ul>\n<li><strong>Aparcamiento</strong>: su plaza está incluida en la residencia</li>\n<li><strong>Circulación</strong>: ¡eviten la Promenade des Anglais en horas punta!</li>\n<li><strong>Alquiler</strong>: agencias en el aeropuerto (Europcar, Hertz, Sixt…)</li>\n</ul>\n<h3>🛴 Bicicletas y Patinetes</h3>\n<ul>\n<li><strong>Vélo Bleu</strong>: bicicletas en libre servicio, estaciones en toda Niza</li>\n<li><strong>Dott / Lime</strong>: patinetes eléctricos (descargar la app)</li>\n</ul>\n","restaurants":"<blockquote>\n<p>🏘️ <strong>Restaurantes del barrio Fabron</strong> → ¡ver la pestaña <strong>Barrio</strong>!</p>\n</blockquote>\n<blockquote>\n<p>🥘 <strong>Especialidades de Niza que deben probar:</strong> Socca (torta de garbanzos), pissaladière (tarta de cebollas/anchoas), ensalada niçoise, petits farcis (verduras rellenas), ratatouille, pan bagnat (sándwich niçois), tourte de blettes (¡tarta de acelgas dulce!).</p>\n</blockquote>\n<h3>🏙️ Centro de la Ciudad / Casco Antiguo de Niza (10-15 min en tranvía L2)</h3>\n<p><em>¡Tomen el tranvía L2 desde la parada Fabron — bajen en Jean Médecin, Garibaldi o Port Lympia según el restaurante!</em></p>\n<h4>🔥 <strong>Chez Pipo</strong> · € · Puerto</h4>\n<p>Socca y niçoise — ¡LA socca de Niza desde 1923! Imprescindible, cocida a fuego de leña. Ambiente rústico y auténtico.</p>\n<p><em>13 rue Bavastro</em></p>\n<h4><strong>Chez René Socca</strong> · € · Casco Antiguo</h4>\n<p>Socca y niçoise — ¡La otra institución de la socca! Terraza animada, pissaladière y petits farcis. ¡Cola = buena señal!</p>\n<p><em>2 rue Miralheti</em></p>\n<h4><strong>Sweet Sisters</strong> · € · Centro</h4>\n<p>Saludable / Pastelería — Ensaladas compostas, ¡carrot cake para morirse! Colorido y fresco, perfecto para un almuerzo ligero.</p>\n<p><em>Centro de la ciudad</em></p>\n<h4><strong>Chez Acchiardo</strong> · €€ · Casco Antiguo</h4>\n<p>Niçoise familiar — Ambiente familiar desde 1927, cocina niçoise auténtica. Estofado, ravioles, callos. Los locales la adoran.</p>\n<p><em>38 rue Droite</em></p>\n<h4><strong>La Merenda</strong> · €€ · Casco Antiguo</h4>\n<p>Niçoise purista — Minúsculo, sin teléfono, sin tarjetas — solo efectivo y verdadera cocina niçoise. ¡Para puristas!</p>\n<p><em>4 rue Raoul Bosio</em></p>\n<h4><strong>Le Safari</strong> · €€ · Cours Saleya</h4>\n<p>Mediterránea — Terraza mítica frente al mercado de flores. Perfecto para una cena en noche de verano.</p>\n<p><em>1 Cours Saleya</em></p>\n<h4><strong>La Storia</strong> · €€ · Cours Saleya</h4>\n<p>Niçoise gourmet — Hermosa terraza soleada, especialidades niçoises (pissaladière, estofado). Menú infantil disponible.</p>\n<p><em>Cours Saleya</em></p>\n<h4><strong>Les Épicuriens</strong> · €€-€€€ · Jean Médecin</h4>\n<p>Bistronómico — Cocina fina de temporada, pulpo sublime. ~40€/pers. Reserva aconsejada.</p>\n<p><em>Barrio Jean Médecin</em></p>\n<h4><strong>Peixes</strong> · €€-€€€ · Centro</h4>\n<p>Pescado / Mariscos — Ambiente marino, carta moderna en torno a productos del mar. Sabores mediterráneos y sudamericanos.</p>\n<p><em>Centro de la ciudad</em></p>\n<h4>⭐ <strong>Restaurant JAN</strong> · €€€€ · Port Lympia</h4>\n<p>Gastronómico (1 estrella) — Experiencia culinaria franco-sudafricana única. Menú 7 tiempos ~165-195€. Para una noche especial. Reserva obligatoria.</p>\n<p><em>Cerca del Puerto</em></p>\n<h3>🍕 Leyenda de Precios</h3>\n<ul>\n<li><strong>€</strong> = menos de 15 € por persona</li>\n<li><strong>€€</strong> = 15-30 € por persona</li>\n<li><strong>€€€</strong> = 30-60 € por persona</li>\n<li><strong>€€€€</strong> = más de 60 € por persona</li>\n</ul>\n<blockquote>\n<p>💡 <strong>Consejo:</strong> En Francia, el servicio está incluido en la cuenta. La propina no es obligatoria, pero redondear o dejar un 5-10% por un servicio excepcional es apreciado.</p>\n</blockquote>\n<blockquote>\n<p>💡 <strong>Consejo:</strong> La mayoría de los restaurantes abren en horarios típicos: almuerzo (12h-14h) luego cena (19h-22h30). Algunos restaurantes permanecen abiertos de forma continua.</p>\n</blockquote>\n","nice":"<h3>🌊 Promenade des Anglais</h3>\n<p>¡La legendaria &quot;Prom&quot;! 7 km de paseo marítimo bordeado de palmeras, desde el aeropuerto al Casco Antiguo. Perfecto para pasear, correr, andar en bicicleta o patinar. Mágico al atardecer. 🌅</p>\n<ul>\n<li><strong>Desde el estudio:</strong> 10-15 min caminando cuesta abajo hacia el mar</li>\n<li><strong>Consejo:</strong> ¡Las famosas sillas azules frente al mar son gratuitas — siéntense y disfruten!</li>\n</ul>\n<h3>🏘️ Casco Antiguo de Niza (Vieux-Nice)</h3>\n<p>Un laberinto encantador de callejuelas coloridas, arquitectura barroca, fachadas ocres y rojas. Paseen sin plan, piérdanse, ¡es la mejor forma de descubrirlo!</p>\n<ul>\n<li><strong>Catedral Sainte-Réparate</strong> — hermoso barroco del siglo XVII</li>\n<li><strong>Capilla de la Misericordia</strong> — obra maestra del arte sacro</li>\n<li><strong>Tranvía:</strong> Paradas Garibaldi u Opéra/Vieille Ville</li>\n</ul>\n<h3>🌸 Cours Saleya — El Mercado</h3>\n<p>¡EL encuentro imprescindible! Mercado de flores y productos frescos en un marco suntuoso.</p>\n<ul>\n<li><strong>Abierto:</strong> Todos los días excepto lunes (mercadillo los lunes)</li>\n<li><strong>Horarios:</strong> ~6h a 17h30 (flores), ~6h a 13h30 (alimentario)</li>\n<li><strong>Consejo:</strong> ¡Prueben las aceitunas, la socca, la pissaladière directamente en el mercado!</li>\n</ul>\n<h3>🏔️ Colina del Castillo (Colline du Château)</h3>\n<p>Vista panorámica 360° sobre Niza, el puerto, la Bahía de los Ángeles y los Alpes. ¡EL mirador!</p>\n<ul>\n<li><strong>Acceso:</strong> Escaleras desde el Casco Antiguo, O <strong>ascensor gratuito</strong> (Tour Bellanda, quai des États-Unis)</li>\n<li><strong>Cascada</strong> artificial arriba, áreas de juegos, vestigios arqueológicos</li>\n<li><strong>Gratuito</strong> — Abierto todos los días</li>\n</ul>\n<h3>🎨 MAMAC — Museo de Arte Moderno y Contemporáneo</h3>\n<p>Colección excepcional: Yves Klein, Niki de Saint Phalle, Warhol, Lichtenstein...</p>\n<ul>\n<li><strong>Dirección:</strong> Place Yves Klein (cerca de Garibaldi)</li>\n<li><strong>Precio:</strong> ¡<strong>GRATUITO!</strong> 🎉</li>\n<li><strong>Cerrado los lunes</strong></li>\n</ul>\n<h3>🎨 Museo Matisse</h3>\n<p>Dedicado a Henri Matisse que vivió en Niza. Colección magnífica en una villa genovesa del siglo XVII, en el corazón de los jardines de Cimiez.</p>\n<ul>\n<li><strong>Precio:</strong> ¡Gratuito!</li>\n<li><strong>Tranvía L1:</strong> Parada Les Arènes / Musée Matisse</li>\n<li><strong>Extra:</strong> Visiten también las <strong>Arenas romanas de Cimiez</strong> justo al lado</li>\n</ul>\n<h3>🎨 Museo Nacional Marc Chagall</h3>\n<p>La colección más grande del mundo de obras de Chagall. Las vidrieras son extraordinarias.</p>\n<ul>\n<li><strong>Dirección:</strong> Avenue Docteur Ménard</li>\n<li><strong>Precio:</strong> ~8 € (gratuito menores 26 años UE)</li>\n</ul>\n<h3>🏛️ Plaza Masséna</h3>\n<p>La plaza principal de Niza — fuentes, estatuas coloridas en sus mástiles (las &quot;Conversation à Nice&quot; de Jaume Plensa), arquitectura Belle Époque roja.</p>\n<ul>\n<li><strong>Por la noche:</strong> Iluminada, ambiente magnífico</li>\n</ul>\n<h3>⛵ Puerto de Niza (Port Lympia)</h3>\n<p>Hermoso puerto colorido, yates y barcos de pesca. Excelentes restaurantes y bares en los muelles.</p>\n<ul>\n<li><strong>Tranvía L2:</strong> Terminal Port Lympia</li>\n</ul>\n<h3>🥕 Mercado de la Liberación</h3>\n<p>¡El mercado de los verdaderos niçois! Menos turístico que el Cours Saleya, más auténtico.</p>\n<ul>\n<li><strong>Abierto:</strong> Todas las mañanas excepto lunes, ~6h a 13h</li>\n<li><strong>Tranvía L1:</strong> Parada Libération</li>\n</ul>\n<h3>🌴 Parque Phoenix</h3>\n<p>Gran jardín botánico tropical con invernadero gigante (¡uno de los más grandes de Europa!), animales, lagos.</p>\n<ul>\n<li><strong>Dirección:</strong> 405 Promenade des Anglais</li>\n<li><strong>Precio:</strong> ~5 €</li>\n<li><strong>Tranvía L2:</strong> Parada Parc Phoenix (¡a pocas paradas de su lugar!)</li>\n</ul>\n<h3>🎯 Actividades y Excursiones (Verano)</h3>\n<p><strong>🚤 Salidas en Barco</strong></p>\n<ul>\n<li>Paseos en barco por la costa, calas escondidas, paradas para bañarse</li>\n<li>Excursión hacia Saint-Jean-Cap-Ferrat, Mónaco, Islas de Lérins</li>\n<li>📱 Reservar: <a href=\"https://www.getyourguide.com/nice-l314/\">GetYourGuide Nice</a> | <a href=\"https://www.viator.com/Nice/d478-ttd\">Viator Nice</a> | <a href=\"https://www.explorenicecotedazur.com/en/explore/discovery-tours/boat-trips/\">Trans Côte d&#39;Azur</a></li>\n</ul>\n<p><strong>🚗 Excursiones de un Día</strong></p>\n<ul>\n<li><strong>Mónaco</strong> — 20 min en tren, el peñón, casino, jardín exótico</li>\n<li><strong>Èze</strong> — pueblo colgado, vista vertiginosa, perfumería Fragonard</li>\n<li><strong>Antibes / Juan-les-Pins</strong> — murallas, Picasso, playas de arena</li>\n<li><strong>Cannes</strong> — Croisette, casco antiguo del Suquet, islas de Lérins</li>\n<li><strong>Saint-Paul-de-Vence</strong> — pueblo artista, fundación Maeght</li>\n<li><strong>Gargantas del Verdón</strong> — cañón espectacular (~2h de carretera)</li>\n<li><strong>Mercado de Vintimille</strong> (Italia) — viernes por la mañana, 40 min en tren, compras y productos italianos</li>\n<li>📱 Reservar: <a href=\"https://www.getyourguide.com/nice-l314/\">GetYourGuide</a> | <a href=\"https://www.viator.com/Nice/d478-ttd\">Viator</a></li>\n</ul>\n<p><strong>🎭 Eventos Verano 2026</strong></p>\n<ul>\n<li><strong>Fiesta de la Música</strong> — 21 junio 🎶 (¡conciertos gratuitos por toda Niza!)</li>\n<li><strong>Festival La Crème</strong> — 26-28 junio, Villefranche-sur-Mer (música, gastronomía, al aire libre)</li>\n<li><strong>Festival de Jazz de Niza</strong> — julio (¡uno de los festivales de jazz más antiguos del mundo!)</li>\n<li><strong>Fuegos artificiales</strong> — julio-agosto en la Promenade des Anglais</li>\n<li><strong>Fiesta de la Lavanda</strong> — julio-agosto, Valensole (campos de lavanda, ~2h de carretera)</li>\n<li>📱 Agenda completa: <a href=\"https://www.explorenicecotedazur.com/preparer/nos-grands-evenements/agenda/\">explorenicecotedazur.com/agenda</a> | <a href=\"https://cotedazurfrance.fr/decouvrir/grands-evenements/\">cotedazurfrance.fr</a></li>\n</ul>\n<p><strong>🏊 Alquiler y Actividades Deportivas</strong></p>\n<ul>\n<li><strong>Vélos Bleus</strong> — bicicletas en libre servicio en toda Niza</li>\n<li>Alquiler de bicicletas / e-bikes / patinetes: numerosos alquiladores en el centro</li>\n<li>Buceo, kayak, paddle — desde las playas o el puerto</li>\n<li>📱 Buscar: <a href=\"https://www.tripadvisor.fr/Attractions-g187234-Activities-Nice_French_Riviera_Cote_d_Azur_Provence_Alpes_Cote_d_Azur.html\">TripAdvisor Nice actividades</a></li>\n</ul>\n","plages":"<h3>⚠️ ¡Importante saber antes que nada!</h3>\n<p>Las playas de Niza son de <strong>guijarros</strong> (¡no hay arena!). Uno se acostumbra rápidamente, pero traigan:</p>\n<ul>\n<li>👟 <strong>Zapatos de agua</strong> (se venden en todas partes en Niza, ~5-10 €)</li>\n<li>🏖️ <strong>Colchoneta de playa</strong> (¡comodidad sobre los guijarros!)</li>\n<li>🧴 Crema solar (el sol pega fuerte aquí)</li>\n</ul>\n<h3>🏖️ Playas Cercanas al Estudio</h3>\n<p><strong>Playas de Fabron / Carras</strong> <em>(~11 min caminando por el atajo)</em> 🏅</p>\n<ul>\n<li>✅ <strong>Públicas y gratuitas</strong></li>\n<li>✅ Menos abarrotadas que el centro de la ciudad</li>\n<li>✅ Agua clara y limpia</li>\n<li>Duchas y accesos al mar acondicionados en algunos lugares</li>\n<li>¡Es su playa de barrio — disfrútenla!</li>\n</ul>\n<h3>🏖️ Playas del Centro de la Ciudad</h3>\n<h4>Playas públicas (gratuitas)</h4>\n<table>\n<thead>\n<tr>\n<th>Playa</th>\n<th>Particularidad</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Playa des Ponchettes</strong></td>\n<td>En pleno Casco Antiguo, ambiente animado</td>\n</tr>\n<tr>\n<td><strong>Playa du Centenaire</strong></td>\n<td>Frente al Jardín Albert 1er, bien acondicionada</td>\n</tr>\n</tbody></table>\n<h4>Playas privadas</h4>\n<h4><strong>Blue Beach</strong> · €€</h4>\n<p>Buen ambiente, música, cócteles</p>\n<h4><strong>Castel Plage</strong> · €€</h4>\n<p>Frente al Casco Antiguo, restaurante en el lugar</p>\n<h4><strong>Beau Rivage</strong> · €€€</h4>\n<p>Restaurante, tumbonas, servicio de playa de lujo</p>\n<h3>🏖️ La Joya Secreta</h3>\n<p><strong>Villefranche-sur-Mer</strong> <em>(20 min en coche o autobús)</em> — ¡Una de las raras <strong>playas de arena</strong> de la Costa Azul! Agua turquesa en una bahía protegida. Vale la pena el desvío.</p>\n<blockquote>\n<p>💡 <strong>Consejo:</strong> Las playas privadas generalmente proponen una tumbona + parasol por 15-25 €/día. El restaurante es un plus pero no obligatorio.</p>\n</blockquote>\n","quartier":"<p><img src=\"images/vue-panoramique-fabron.jpg\" alt=\"Vista panorámica desde Fabron — la bahía, el Cap de Nice\"></p>\n<h3>🍽️ Restaurantes del Barrio (distancia a pie)</h3>\n<h4>⭐ <strong>NÂGA Street-food Nice Ouest</strong> · € · 4.9</h4>\n<p>Street food asiático — Pequeño pero increíble — sabores auténticos, porciones generosas. ¡Nuestra elección favorita!</p>\n<h4>⭐ <strong>La Pignata</strong> · €-€€ · 4.1</h4>\n<p>Brasserie / Pizzería — Brasserie de barrio práctico, terraza agradable. Pizzas correctas.</p>\n<h4>⭐ <strong>Chez Cane</strong> · €€ · 4.4</h4>\n<p>Niçoise tradicional — Terraza verde exuberante, estofado de jabalí y ñoquis caseros — ¡toda una institución del barrio!</p>\n<h4>⭐ <strong>Club House du Ciel de Fabron</strong> · €€ · 4.9</h4>\n<p>Francesa — ¡Vistas impresionantes! Marco excepcional en las alturas con panorama al mar. ¡Reserven!</p>\n<h4>⭐ <strong>Le Potiron Gourmet</strong> · €€ · 4.8</h4>\n<p>Francesa creativa — Cocina casera refinada, productos frescos del mercado. Ambiente íntimo.</p>\n<h4>🟢⚪🔴 <strong>CASA LASAGNA</strong> · €€ · 4.8</h4>\n<p>Italiano — ¡Lasañas divinas como en Italia! Pasta fresca, recibimiento cálido.</p>\n<h4>⭐ <strong>Sushi Fabron</strong> · €€ · 4.8</h4>\n<p>Japonés — El mejor sushi del barrio, productos ultra-frescos. Perfecto para una noche tranquila.</p>\n<h3>🛒 Compras y Comercios</h3>\n<p><strong>🏪 Tienda de conveniencia (pequeña):</strong></p>\n<ul>\n<li><strong>Carrefour City</strong> (106 av. de la Californie) — ~6 min caminando cuesta abajo. Práctico para pan, leche, emergencias, pero selección limitada y precios altos.</li>\n</ul>\n<p><strong>🛒 Supermercados de verdad (compras completas):</strong></p>\n<table>\n<thead>\n<tr>\n<th>Lugar</th>\n<th>Dirección</th>\n<th>A pie</th>\n<th>En tranvía L2</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Carrefour Market</strong></td>\n<td>258 av. de la Californie</td>\n<td>~21 min</td>\n<td>~15 min (parada Sainte-Marguerite)</td>\n</tr>\n<tr>\n<td><strong>Intermarché SUPER</strong></td>\n<td>2 Bd René Cassin</td>\n<td>~28 min</td>\n<td>~17 min (parada Las Planas)</td>\n</tr>\n</tbody></table>\n<blockquote>\n<p>💡 <strong>Nuestro consejo:</strong> Para las compras grandes, tomen el tranvía L2 hasta uno de los dos supermercados. El Intermarché es el más grande y barato. Para lo cotidiano, el Carrefour City de abajo es suficiente.</p>\n</blockquote>\n<h3>💊 Salud</h3>\n<ul>\n<li><strong>Farmacia</strong>: Varias farmacias en la avenue de la Californie y av. de Fabron</li>\n<li><strong>Urgencias adultos</strong>: Hôpital l&#39;Archet (CHU Nice), 151 route Saint-Antoine de Ginestière — ☎ 04 92 03 77 77</li>\n<li><strong>Urgencias pediátricas (niños)</strong>: Hôpital Lenval, 57 av. de la Californie — a 2 paradas de tranvía (parada Lenval) — ☎ 04 92 03 03 03</li>\n<li><strong>SOS Médicos Nice</strong>: ☎ 04 93 85 01 01 (visitas 24h/24)</li>\n<li><strong>SAMU / Emergencias</strong>: ☎ 15 o 112 (número de emergencia europeo)</li>\n</ul>\n<h3>🏖️ Acceso a la Playa</h3>\n<p>Desde el estudio, tomen el atajo de escaleras hasta la parada Sainte-Hélène (~5 min), luego bajen hacia la Promenade des Anglais: <strong>~10 minutos a pie en total</strong>. Llegarán a las <strong>playas públicas de Fabron/Carras</strong> — ¡menos abarrotadas que las del centro!</p>\n<h3>🌳 Cerca</h3>\n<ul>\n<li><strong>Museo de Arte Naïf Anatole Jakovsky</strong> (Château Sainte-Hélène) — justo al lado, parque magnífico para pasear</li>\n<li><strong>Abadía de Roseland</strong> — jardín botánico clasificado, a pocos minutos caminando</li>\n<li><strong>Parque Carol de Rumania</strong> — espacio verde familiar</li>\n<li><strong>Centro AnimaNice Fabron</strong> — centro cultural y deportivo del barrio, actividades todo el año</li>\n</ul>\n<h3>🚶 Paseos y Deporte en el Barrio</h3>\n<ul>\n<li><strong>Circuito Acti&#39;Santé Fabron</strong> — recorrido patrimonio botánico del barrio (<a href=\"https://www.nice.fr/sport/parcours/\">nice.fr/sport/parcours</a>)</li>\n<li><strong>Paseo de las colinas de Fabron</strong> — circuito de senderismo con panorama de la bahía de los Ángeles (<a href=\"https://www.visorando.com/randonnee-dans-le-quartier-de-fabron-a-nice/\">visorando.com</a>)</li>\n<li><strong>Promenade des Anglais</strong> — a ~10 min caminando (por el atajo de escaleras), ideal para correr, caminar o andar en bicicleta</li>\n</ul>\n"};
